name: Landing CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: landing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --filter @unjynx/landing...

      - name: Type check
        run: pnpm --filter @unjynx/landing exec astro check
        continue-on-error: true

      - name: Build
        run: pnpm --filter @unjynx/landing build

      - name: Verify build output
        run: |
          if [ ! -d "apps/landing/dist" ]; then
            echo "Build output directory not found"
            exit 1
          fi
          echo "Landing page build verified"
          echo "Output files:"
          find apps/landing/dist -type f | head -20

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: landing-build
          path: apps/landing/dist/
          retention-days: 7
