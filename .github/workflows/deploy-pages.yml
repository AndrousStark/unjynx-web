name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install landing dependencies
        working-directory: landing
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Build landing page (Astro)
        working-directory: landing
        run: pnpm build

      - name: Install admin dependencies
        working-directory: admin
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Build admin panel (Vite)
        working-directory: admin
        run: pnpm build
        env:
          BASE_PATH: /admin/
          VITE_API_URL: https://api.unjynx.me
          VITE_LOGTO_ENDPOINT: https://auth.unjynx.me
          VITE_LOGTO_APP_ID: unjynx-admin-web
          VITE_LOGTO_API_RESOURCE: https://api.unjynx.me

      - name: Install dev-portal dependencies
        working-directory: dev-portal
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Build dev portal (Vite)
        working-directory: dev-portal
        run: pnpm build
        env:
          BASE_PATH: /dev/
          VITE_API_URL: https://api.unjynx.me
          VITE_LOGTO_ENDPOINT: https://auth.unjynx.me
          VITE_LOGTO_APP_ID: unjynx-dev-portal
          VITE_LOGTO_API_RESOURCE: https://api.unjynx.me

      - name: Merge builds into single output
        run: |
          mkdir -p _site
          cp -r landing/dist/* _site/
          mkdir -p _site/admin
          cp -r admin/dist/* _site/admin/
          mkdir -p _site/dev
          cp -r dev-portal/dist/* _site/dev/

          # SPA routing for GitHub Pages — copy index.html to sub-paths
          # so OIDC callback and login routes load the SPA correctly
          for path in callback login; do
            mkdir -p _site/admin/$path
            cp _site/admin/index.html _site/admin/$path/index.html
            mkdir -p _site/dev/$path
            cp _site/dev/index.html _site/dev/$path/index.html
          done

          # Root 404.html fallback for any other SPA routes
          cp _site/admin/index.html _site/admin/404.html
          cp _site/dev/index.html _site/dev/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
